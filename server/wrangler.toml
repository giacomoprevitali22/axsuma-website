name = "axsuma-cms"
main = "cms-worker.js"
compatibility_date = "2024-01-01"

# KV Namespace bindings — replace the IDs after running:
#   wrangler kv namespace create CMS_CONTENT
#   wrangler kv namespace create CMS_USERS
[[kv_namespaces]]
binding = "CMS_CONTENT"
id = "3c15a60c562f495c8839ea1f251dfc6b"

[[kv_namespaces]]
binding = "CMS_USERS"
id = "63d89d5ce0cb49acbc7430b2d4ba5b92"

# Environment variables (optional — defaults are hardcoded in the Worker)
# To override, use:
#   wrangler secret put JWT_SECRET
# The default users (Giacomo, Jason, Charlotte) are created automatically on first run.

# Custom domain (optional — configure after first deploy)
# routes = [
#   { pattern = "cms.axsuma.com/*", zone_name = "axsuma.com" }
# ]
